<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f5f3ff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker></defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Inter,Arial" font-size="34" font-weight="700" fill="#111827">Storage & Buffer Pool：数据库的冷热分层</text>
  <text x="60" y="112" font-family="Inter,Arial" font-size="18" fill="#64748b">AI 系统里的向量、文档、metadata、embedding cache，本质都在做数据布局与缓存管理。</text>
  <g font-family="Inter,Arial" text-anchor="middle" font-size="18">
    <rect x="70" y="250" width="150" height="80" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="145" y="283">Query</text><text x="145" y="309" font-size="15" fill="#64748b">RAG request</text>
    <rect x="310" y="160" width="180" height="78" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/><text x="400" y="193">Buffer Pool</text><text x="400" y="219" font-size="15" fill="#64748b">hot pages</text>
    <rect x="310" y="330" width="180" height="78" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/><text x="400" y="363">Cache</text><text x="400" y="389" font-size="15" fill="#64748b">embedding / result</text>
    <rect x="600" y="145" width="180" height="78" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><text x="690" y="178">Index</text><text x="690" y="204" font-size="15" fill="#64748b">B+Tree / ANN</text>
    <rect x="600" y="330" width="180" height="78" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="690" y="363">Storage</text><text x="690" y="389" font-size="15" fill="#64748b">pages / segments</text>
    <rect x="910" y="250" width="190" height="80" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/><text x="1005" y="283">Retrieved Context</text><text x="1005" y="309" font-size="15" fill="#64748b">top-k chunks</text>
  </g>
  <g stroke="#7c3aed" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M220 290 C260 290 270 199 310 199"/><path d="M220 290 C260 290 270 369 310 369"/>
    <path d="M490 199 H600"/><path d="M490 369 H600"/><path d="M690 223 V330"/>
    <path d="M780 184 C850 184 860 270 910 280"/><path d="M780 369 C850 369 860 310 910 304"/>
  </g>
  <g font-family="Inter,Arial" font-size="18" fill="#374151">
    <rect x="120" y="485" width="960" height="70" rx="18" fill="#fff" stroke="#ddd6fe"/>
    <text x="155" y="518">延迟心法：一次 retrieval 慢不只因为模型慢，还可能是 page miss、index scan、rerank、网络和缓存命中率。</text>
    <text x="155" y="545">数据库思想帮助我们判断：数据该怎么放、索引该怎么建、缓存该缓存什么。</text>
  </g>
</svg>
