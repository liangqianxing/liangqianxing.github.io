<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" rx="28" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Inter,Arial" font-size="34" font-weight="700" fill="#111827">Operator Fusion：减少 Kernel Launch 与显存往返</text>
  <text x="60" y="112" font-family="Inter,Arial" font-size="18" fill="#64748b">把多个小算子融合成一个 kernel，避免中间结果反复写回 HBM。</text>
  <g font-family="Inter,Arial" text-anchor="middle" font-size="18">
    <text x="270" y="170" font-size="22" fill="#0f172a">未融合</text>
    <rect x="80" y="220" width="100" height="62" rx="12" fill="#dbeafe" stroke="#2563eb"/><text x="130" y="258">MatMul</text>
    <rect x="220" y="220" width="100" height="62" rx="12" fill="#fee2e2" stroke="#ef4444"/><text x="270" y="258">Bias</text>
    <rect x="360" y="220" width="100" height="62" rx="12" fill="#dcfce7" stroke="#16a34a"/><text x="410" y="258">GELU</text>
    <rect x="500" y="220" width="100" height="62" rx="12" fill="#fef3c7" stroke="#f59e0b"/><text x="550" y="258">Dropout</text>
    <text x="340" y="345" fill="#475569">4 次 launch + 多次 HBM 读写中间激活</text>
    <text x="880" y="170" font-size="22" fill="#0f172a">融合后</text>
    <rect x="760" y="220" width="250" height="78" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/><text x="885" y="252">Fused Kernel</text><text x="885" y="279" font-size="15" fill="#64748b">MatMul + Bias + GELU + Dropout</text>
    <text x="885" y="345" fill="#475569">1 次 launch + 寄存器/共享内存内完成更多工作</text>
  </g>
  <path d="M180 251 H220 M320 251 H360 M460 251 H500" stroke="#64748b" stroke-width="4"/>
  <g font-family="Inter,Arial" font-size="19" fill="#334155">
    <rect x="145" y="400" width="910" height="78" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="180" y="432">收益来源：减少 Python/driver 调度、减少 kernel 启动固定成本、减少 HBM bandwidth 压力。</text>
    <text x="180" y="462">代价：融合 kernel 更难写、更难调试，动态 shape 和复杂分支会降低融合机会。</text>
  </g>
</svg>
