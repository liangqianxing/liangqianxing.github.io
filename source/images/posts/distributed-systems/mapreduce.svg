<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f0f9ff"/><stop offset="1" stop-color="#f8fafc"/></linearGradient><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#0369a1"/></marker></defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Inter,Arial" font-size="34" font-weight="700" fill="#0f172a">MapReduce：把大任务拆成可重试的小任务</text>
  <text x="60" y="112" font-family="Inter,Arial" font-size="18" fill="#475569">核心不是 map/reduce API，而是 master 调度、数据分片、失败重试和中间结果 shuffle。</text>
  <g font-family="Inter,Arial" text-anchor="middle" font-size="18">
    <rect x="60" y="245" width="150" height="78" rx="16" fill="#fff" stroke="#0ea5e9" stroke-width="3"/><text x="135" y="278">Input</text><text x="135" y="304" font-size="15" fill="#64748b">split files</text>
    <rect x="300" y="145" width="140" height="70" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/><text x="370" y="188">Map 1</text>
    <rect x="300" y="255" width="140" height="70" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/><text x="370" y="298">Map 2</text>
    <rect x="300" y="365" width="140" height="70" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/><text x="370" y="408">Map 3</text>
    <rect x="535" y="245" width="150" height="78" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/><text x="610" y="278">Shuffle</text><text x="610" y="304" font-size="15" fill="#64748b">group by key</text>
    <rect x="790" y="190" width="150" height="70" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="865" y="233">Reduce A</text>
    <rect x="790" y="320" width="150" height="70" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="865" y="363">Reduce B</text>
    <rect x="1030" y="245" width="120" height="78" rx="16" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/><text x="1090" y="278">Output</text><text x="1090" y="304" font-size="15" fill="#64748b">results</text>
  </g>
  <g stroke="#0369a1" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M210 284 C250 284 260 180 300 180"/><path d="M210 284 H300"/><path d="M210 284 C250 284 260 400 300 400"/>
    <path d="M440 180 C495 180 500 260 535 270"/><path d="M440 290 H535"/><path d="M440 400 C495 400 500 320 535 305"/>
    <path d="M685 270 C730 270 745 225 790 225"/><path d="M685 305 C730 305 745 355 790 355"/>
    <path d="M940 225 C990 225 1000 275 1030 275"/><path d="M940 355 C990 355 1000 300 1030 300"/>
  </g>
  <g font-family="Inter,Arial" font-size="18" fill="#334155">
    <rect x="110" y="490" width="980" height="66" rx="18" fill="#fff" stroke="#cbd5e1"/>
    <text x="145" y="530">容错心法：任务可以失败，worker 可以挂，master 通过状态机和重试把结果做成“看起来可靠”。</text>
  </g>
</svg>
