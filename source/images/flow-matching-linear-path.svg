<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Flow Matching 线性插值路径</title>
  <desc id="desc">x_t 等于 (1-t)x_0 加 t x_1，速度方向为 x_1 减 x_0。</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7c3aed"/>
    </marker>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" rx="26" fill="#fbfaff"/>
  <text x="480" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700" fill="#1f2937">Conditional Flow Matching 的线性路径</text>
  <path d="M150 210 C290 130, 450 130, 810 210" fill="none" stroke="url(#line)" stroke-width="7" marker-end="url(#arrow)"/>
  <g font-family="Inter, Arial, sans-serif">
    <circle cx="150" cy="210" r="42" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="150" y="204" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">x₀</text>
    <text x="150" y="229" text-anchor="middle" font-size="14" fill="#92400e">data</text>
    <circle cx="810" cy="210" r="42" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="810" y="204" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">x₁</text>
    <text x="810" y="229" text-anchor="middle" font-size="14" fill="#1d4ed8">noise</text>
    <circle cx="480" cy="143" r="35" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="480" y="150" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">xₜ</text>
    <text x="480" y="285" text-anchor="middle" font-size="24" font-weight="700" fill="#374151">xₜ = (1 − t)x₀ + tx₁</text>
    <text x="480" y="318" text-anchor="middle" font-size="18" fill="#6b7280">target velocity: uₜ = x₁ − x₀</text>
    <text x="304" y="122" text-anchor="middle" font-size="15" fill="#9a3412">t = 0</text>
    <text x="650" y="122" text-anchor="middle" font-size="15" fill="#1e40af">t = 1</text>
  </g>
</svg>
